<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Speed Tap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:Arial;user-select:none}
#wrap{text-align:center}
#timer{color:#8a8aaa;font-size:16px;margin-bottom:8px}
#score{color:#fff;font-size:28px;font-weight:800;margin-bottom:24px}
#target{width:140px;height:140px;border-radius:50%;background:#ff6b6b;margin:0 auto 24px;cursor:pointer;transition:transform 0.05s;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:rgba(255,255,255,0.5)}
#target:active{transform:scale(0.85)}
#msg{color:#8a8aaa;font-size:18px;margin-bottom:16px}
button{padding:10px 28px;font-size:16px;background:#667eea;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div id="wrap">
<div id="timer">Time: 10s</div>
<div id="score">Score: 0</div>
<div id="target">TAP!</div>
<div id="msg">Click the circle as fast as you can!</div>
<button onclick="start()">Start Game</button>
</div>
<script>
var score=0,time=10,playing=false,timerInterval;
function start(){score=0;time=10;playing=true;document.getElementById("score").textContent="Score: 0";document.getElementById("timer").textContent="Time: 10s";document.getElementById("msg").textContent="GO GO GO!";clearInterval(timerInterval);timerInterval=setInterval(function(){time--;document.getElementById("timer").textContent="Time: "+time+"s";if(time<=0){playing=false;clearInterval(timerInterval);document.getElementById("msg").textContent="Time up! "+score+" taps";document.getElementById("target").style.background="#2a2a4a"}},1000)}
function tap(){if(!playing)return;score++;document.getElementById("score").textContent="Score: "+score;var t=document.getElementById("target");var hue=Math.floor(Math.random()*360);t.style.background="hsl("+hue+",70%,50%)"}
document.getElementById("target").addEventListener("mousedown",tap);
document.getElementById("target").addEventListener("touchstart",function(e){e.preventDefault();tap()});
</script>
</body>
</html>
