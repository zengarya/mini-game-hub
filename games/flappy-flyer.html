<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flappy Flyer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:Arial}
#score{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:28px;font-weight:800;z-index:10}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:20px;text-align:center;z-index:10}
canvas{display:block}
</style>
</head>
<body>
<div id="score">0</div>
<div id="msg">Press SPACE or Tap to Start</div>
<canvas id="c"></canvas>
<script>
var c=document.getElementById("c"),ctx=c.getContext("2d");
var W=400,H=600;c.width=W;c.height=H;c.style.maxWidth="100vw";c.style.maxHeight="100vh";
var bird={x:80,y:250,w:30,h:24,vy:0},gravity=0.5,jump=-8;
var pipes=[],pipeW=50,pipeGap=140,pipeSpeed=3,frame=0,score=0,playing=false;
function reset(){bird.y=250;bird.vy=0;pipes=[];score=0;frame=0;playing=false;document.getElementById("msg").style.display="block";document.getElementById("msg").textContent="Press SPACE or Tap to Start";document.getElementById("score").textContent="0"}
function jumpBird(){if(!playing){playing=true;document.getElementById("msg").style.display="none"}bird.vy=jump}
function update(){if(!playing)return;frame++;bird.vy+=gravity;bird.y+=bird.vy;if(frame%90===0){var h=Math.floor(Math.random()*200)+100;pipes.push({x:W,y:0,w:pipeW,h:h});pipes.push({x:W,y:h+pipeGap,w:pipeW,h:H-h-pipeGap})}for(var i=pipes.length-1;i>=0;i--){pipes[i].x-=pipeSpeed;if(pipes[i].x+pipes[i].w<0){pipes.splice(i,1);if(pipes[i]&&pipes[i].y===0)score++;document.getElementById("score").textContent=score}}if(bird.y<0||bird.y+bird.h>H){gameOver();return}for(var i=0;i<pipes.length;i++){var p=pipes[i];if(bird.x<p.x+p.w&&bird.x+bird.w>p.x&&bird.y<p.y+p.h&&bird.y+bird.h>p.y){gameOver();return}}}
function gameOver(){playing=false;document.getElementById("msg").style.display="block";document.getElementById("msg").innerHTML="Score: "+score+"<br><small>Press SPACE to retry</small>"}
function draw(){ctx.fillStyle="#4facfe";ctx.fillRect(0,0,W,H);ctx.fillStyle="#ffd93d";ctx.fillRect(bird.x,bird.y,bird.w,bird.h);ctx.fillStyle="#43e97b";pipes.forEach(function(p){ctx.fillRect(p.x,p.y,p.w,p.h)});ctx.fillStyle="#8B4513";ctx.fillRect(0,H-20,W,20)}
function loop(){update();draw();requestAnimationFrame(loop)}
document.addEventListener("keydown",function(e){if(e.code==="Space"){e.preventDefault();if(!playing&&score>0)reset();jumpBird()}});
c.addEventListener("click",function(){if(!playing&&score>0)reset();jumpBird()});
reset();loop();
</script>
</body>
</html>
