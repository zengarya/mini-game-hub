<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Solitaire Lite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:Arial}
#wrap{text-align:center}
#info{color:#fff;font-size:18px;font-weight:600;margin-bottom:12px}
#deck{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;max-width:480px}
.card{width:64px;height:90px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;background:#2a2a4a;color:#8a8aaa;transition:all 0.2s;user-select:none;border:2px solid transparent}
.card.matched{background:#43e97b;color:#fff;pointer-events:none;border-color:#2ed573}
.card.selected{background:#ffd93d;color:#1a1a2e;border-color:#ff6b6b}
#score{color:#8a8aaa;font-size:16px;margin-bottom:12px}
button{padding:10px 28px;font-size:16px;background:#667eea;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div id="wrap">
<div id="info">Match pairs of cards</div>
<div id="deck"></div>
<div id="score">Pairs: 0 / 12</div>
<button onclick="reset()">New Game</button>
</div>
<script>
var suits=["♥","♦","♠","♣"],ranks=["A","2","3","4","5","6"],cards=[];
for(var s=0;s<suits.length;s++)for(var r=0;r<ranks.length;r++)cards.push(ranks[r]+suits[s]);
var deck=[],flipped=[],matched=[],selIdx=-1,pairs=0;
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}}
function reset(){deck=cards.concat(cards);shuffle(deck);flipped=[];matched=[];selIdx=-1;pairs=0;document.getElementById("score").textContent="Pairs: 0 / 12";document.getElementById("info").textContent="Match pairs of cards";render()}
function clickCard(i){if(matched.indexOf(i)!==-1||i===selIdx)return;if(selIdx===-1){selIdx=i;render();return}if(deck[i]===deck[selIdx]){matched.push(i,selIdx);pairs++;document.getElementById("score").textContent="Pairs: "+pairs+" / 12";selIdx=-1;if(pairs===12)document.getElementById("info").textContent="You Win! 🎉"}else{var prev=selIdx;selIdx=-1;flipped.push(i,prev);render();setTimeout(function(){flipped=[];render()},500)}render()}
function render(){var d=document.getElementById("deck");d.innerHTML="";for(var i=0;i<deck.length;i++){var c=document.createElement("div");c.className="card";var show=matched.indexOf(i)!==-1||flipped.indexOf(i)!==-1||i===selIdx;if(show)c.textContent=deck[i];if(selIdx===i)c.classList.add("selected");if(matched.indexOf(i)!==-1)c.classList.add("matched");var color=deck[i].slice(-1)==="♥"||deck[i].slice(-1)==="♦"?"#ff6b6b":"#4facfe";if(show)c.style.color=color;c.addEventListener("click",(function(j){return function(){clickCard(j)}})(i));d.appendChild(c)}}
reset();
</script>
</body>
</html>
