<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Minesweeper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:Arial}
#wrap{text-align:center}
#info{color:#fff;font-size:18px;margin-bottom:12px;font-weight:600}
#board{display:grid;grid-template-columns:repeat(9,42px);gap:2px;justify-content:center;margin-bottom:16px}
.cell{width:42px;height:42px;border-radius:4px;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;background:#2a2a4a;transition:background 0.1s;user-select:none}
.cell.revealed{background:#1a1a2e}
.cell.mine{background:#ff6b6b}
button{padding:10px 28px;font-size:16px;background:#ff6b6b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div id="wrap">
<div id="info">Mines: 10</div>
<div id="board"></div>
<button onclick="reset()">New Game</button>
</div>
<script>
var R=9,C=9,M=10,grid,revealed,flagged,gameOver;
var COLORS=["","#4facfe","#43e97b","#ff6b6b","#764ba2","#fa709a","#edcc61","#f2b179","#a18cd1"];
function reset(){grid=[];revealed=[];flagged=[];gameOver=false;for(var r=0;r<R;r++){grid[r]=new Array(C).fill(0);revealed[r]=new Array(C).fill(false);flagged[r]=new Array(C).fill(false)}var placed=0;while(placed<M){var rr=Math.floor(Math.random()*R),cc=Math.floor(Math.random()*C);if(grid[rr][cc]!==-1){grid[rr][cc]=-1;placed++}}for(var r=0;r<R;r++)for(var c=0;c<C;c++)if(grid[r][c]!==-1){var count=0;for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){var nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C&&grid[nr][nc]===-1)count++}grid[r][c]=count}document.getElementById("info").textContent="Mines: 10";render()}
function reveal(r,c){if(gameOver||revealed[r][c]||flagged[r][c])return;revealed[r][c]=true;if(grid[r][c]===-1){gameOver=true;document.getElementById("info").textContent="Game Over!";for(var rr=0;rr<R;rr++)for(var cc=0;cc<C;cc++)if(grid[rr][cc]===-1)revealed[rr][cc]=true;render();return}if(grid[r][c]===0){for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){var nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C)reveal(nr,nc)}}if(checkWin()){gameOver=true;document.getElementById("info").textContent="You Win!"}}
function flag(r,c){if(gameOver||revealed[r][c])return;flagged[r][c]=!flagged[r][c];render()}
function checkWin(){for(var r=0;r<R;r++)for(var c=0;c<C;c++)if(grid[r][c]!==-1&&!revealed[r][c])return false;return true}
function render(){var b=document.getElementById("board");b.innerHTML="";for(var r=0;r<R;r++)for(var c=0;c<C;c++){var d=document.createElement("div");d.className="cell";if(revealed[r][c]){d.classList.add("revealed");if(grid[r][c]===-1){d.classList.add("mine");d.textContent="💣"}else if(grid[r][c]>0){d.textContent=grid[r][c];d.style.color=COLORS[grid[r][c]]}}else if(flagged[r][c]){d.textContent="🚩"}d.addEventListener("click",(function(rr,cc){return function(){reveal(rr,cc)}})(r,c));d.addEventListener("contextmenu",(function(rr,cc){return function(e){e.preventDefault();flag(rr,cc)}})(r,c));b.appendChild(d)}}
reset();
</script>
</body>
</html>
