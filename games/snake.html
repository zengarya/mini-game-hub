<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:Arial}
canvas{border:2px solid #333;border-radius:4px}
#score{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:20px;font-weight:700}
#gameover{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff6b6b;font-size:32px;font-weight:800;display:none;text-align:center}
#gameover button{margin-top:16px;padding:10px 28px;font-size:16px;background:#ff6b6b;color:#fff;border:none;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="gameover">Game Over!<br><button onclick="reset()">Play Again</button></div>
<canvas id="c"></canvas>
<script>
var c=document.getElementById("c"),ctx=c.getContext("2d"),s=20,t=20,w=20,h=20;
c.width=w*s;c.height=h*s;
var snake,dx,dy,food,score,gameOver,loop;
function reset(){snake=[{x:5,y:10},{x:4,y:10},{x:3,y:10}];dx=1;dy=0;score=0;gameOver=false;document.getElementById("gameover").style.display="none";placeFood();clearInterval(loop);loop=setInterval(tick,100)}
function placeFood(){do{food={x:Math.floor(Math.random()*w),y:Math.floor(Math.random()*h)}}while(snake.some(function(p){return p.x===food.x&&p.y===food.y}))}
function tick(){if(gameOver)return;var head={x:snake[0].x+dx,y:snake[0].y+dy};if(head.x<0||head.x>=w||head.y<0||head.y>=h||snake.some(function(p){return p.x===head.x&&p.y===head.y})){gameOver=true;clearInterval(loop);document.getElementById("gameover").style.display="block";document.getElementById("gameover").children[0].textContent="Score: "+score;return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById("score").textContent="Score: "+score;placeFood()}else{snake.pop()}draw()}
function draw(){ctx.fillStyle="#0f0f1a";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="#4facfe";snake.forEach(function(p){ctx.fillRect(p.x*s+1,p.y*s+1,s-2,s-2)});ctx.fillStyle="#ff6b6b";ctx.beginPath();ctx.arc(food.x*s+s/2,food.y*s+s/2,s/2-2,0,Math.PI*2);ctx.fill()}
document.addEventListener("keydown",function(e){if(e.key==="ArrowUp"&&dy!==1){dx=0;dy=-1}else if(e.key==="ArrowDown"&&dy!==-1){dx=0;dy=1}else if(e.key==="ArrowLeft"&&dx!==1){dx=-1;dy=0}else if(e.key==="ArrowRight"&&dx!==-1){dx=1;dy=0}});
reset();
</script>
</body>
</html>
